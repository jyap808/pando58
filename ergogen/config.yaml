cases:
  plate_standalone:
    - name: plate_standalone
      extrude: 1.6

  # 3D case
  case_bottom_right:
    $args: [right]
    $extends: cases.case_bottom_left
  case_bottom_left:
    $params: [<side>]
    $args: [left]
    wall:
      name: case_outer_<side>
      extrude: csWallZ
      operation: add
    gap:
      name: case_inner_<side>
      shift: [0, 0, csBottomZ]
      extrude: csWallZ
      operation: subtract
    mounts:
      name: _mounts_<side>
      extrude: csWallZ
      operation: subtract
    # subtractions for MCU USB and RJ45
    rj45:
        name: _rj45_front_inner_<side>
        extrude: 100
        shift: [0,0,csBottomZ+6]
        rotate: [0,0,90]
        operation: subtract
    # this is not required when using hot swap sockets
    # probably needs to be shifted similar to RJ45 if using just socket headers
    mcu:
        name: _mcu_front_inner_<side>
        extrude: 100
        shift: [0,0,csBottomZ+11]
        operation: subtract

  # Sandwich case
  # Bottom and Cover only need mirror versions if we add PEM stand offs
  case_sw_bottom:
    - name: case_sw_outer_left
      extrude: 1.6
  case_sw_cover:
    - name: case_cover_sw_left
      extrude: 1.6
  case_sw_lip:
    - name: case_lip_sw_left
      extrude: 1.6

  # Non-Sheet metal middle section
  # Screw holes will be the size of the stand offs
  # Start with case_sw_outer
  # Subtract case lip
  # Subtract RJ45 hole
  # Subtract USBC hole
  case_sw_middle:
    case_sw_outer:
      name: case_sw_outer_left
      extrude: 25
      operation: add
    # We could expand this further since it is not seen on the inside
    case_inner:
      name: case_inner_left
      extrude: 40
      # A fillet can't be done here
      #fillet: baseFillet
      operation: subtract
    # This needs an expanded version
    case_lip_sw:
      name: case_lip_middle_sw_left
      extrude: 30
      shift: [0,0,standoffHeight]
      operation: subtract
    # subtractions for MCU USB and RJ45
    rj45:
        name: _rj45_front_inner_left
        extrude: 100
        shift: [0,0,6]
        rotate: [0,0,90]
        operation: subtract
    # this is not required when using hot swap sockets
    # probably needs to be shifted similar to RJ45 if using just socket headers
    mcu:
      name: _mcu_front_inner_left
      extrude: 100
      # Standoff + Lip
      shift: [0,0,standoffHeight+2.5]
      operation: subtract
    cover:
      name: _case_cover_sw_expand_left
      extrude: 30
      shift: [0,0,standoffCoverHeight]
      operation: subtract
    mounts:
      name: _mounts_middle_sw_left
      extrude: 100
      operation: subtract